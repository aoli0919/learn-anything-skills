<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="420" viewBox="0 0 1120 420" role="img" aria-label="Learn Anything Skills learning loop">
  <rect width="1120" height="420" rx="22" fill="#f8fafc"/>
  <text x="56" y="58" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">The learning loop</text>
  <text x="56" y="88" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="16">Each skill produces a next action, visible artifact, check question, resource cap, and reflection.</text>

  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="58" y="150" width="130" height="88" rx="14" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="123" y="185" text-anchor="middle" fill="#075985" font-size="17" font-weight="700">Goal</text>
    <text x="123" y="212" text-anchor="middle" fill="#0f172a" font-size="13">What to learn?</text>

    <line x1="198" y1="194" x2="268" y2="194" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>

    <rect x="278" y="150" width="130" height="88" rx="14" fill="#dcfce7" stroke="#16a34a"/>
    <text x="343" y="185" text-anchor="middle" fill="#166534" font-size="17" font-weight="700">Map</text>
    <text x="343" y="212" text-anchor="middle" fill="#0f172a" font-size="13">What matters?</text>

    <line x1="418" y1="194" x2="488" y2="194" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>

    <rect x="498" y="150" width="130" height="88" rx="14" fill="#fef9c3" stroke="#ca8a04"/>
    <text x="563" y="185" text-anchor="middle" fill="#854d0e" font-size="17" font-weight="700">Learn</text>
    <text x="563" y="212" text-anchor="middle" fill="#0f172a" font-size="13">One concept</text>

    <line x1="638" y1="194" x2="708" y2="194" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>

    <rect x="718" y="150" width="130" height="88" rx="14" fill="#fae8ff" stroke="#c026d3"/>
    <text x="783" y="185" text-anchor="middle" fill="#86198f" font-size="17" font-weight="700">Build</text>
    <text x="783" y="212" text-anchor="middle" fill="#0f172a" font-size="13">Small artifact</text>

    <line x1="858" y1="194" x2="928" y2="194" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>

    <rect x="938" y="150" width="130" height="88" rx="14" fill="#fee2e2" stroke="#dc2626"/>
    <text x="1003" y="185" text-anchor="middle" fill="#991b1b" font-size="17" font-weight="700">Reflect</text>
    <text x="1003" y="212" text-anchor="middle" fill="#0f172a" font-size="13">Adjust tomorrow</text>

    <path d="M1003 248 C1003 335 122 335 122 248" fill="none" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
  </g>

  <g font-family="Inter, Arial, sans-serif" font-size="14">
    <rect x="164" y="296" width="792" height="58" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="196" y="331" fill="#0f172a">Learning contract:</text>
    <text x="340" y="331" fill="#334155">next action</text>
    <text x="455" y="331" fill="#334155">visible artifact</text>
    <text x="594" y="331" fill="#334155">check question</text>
    <text x="735" y="331" fill="#334155">what to ignore</text>
    <text x="872" y="331" fill="#334155">reflection</text>
  </g>
</svg>

